- name: Check helm exists
  ansible.builtin.command: helm version
  register: helm_check
  failed_when: false
  changed_when: false

- name: Install Helm (only if missing)
  shell: |
    set -e
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    executable: /bin/bash
  when: helm_check.rc != 0