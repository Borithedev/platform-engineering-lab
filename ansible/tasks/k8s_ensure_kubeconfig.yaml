- name: Assert kubeconfig exists
  stat:
    path: /etc/kubernetes/admin.conf
  register: admin_conf

- name: Fail if kubeconfig missing (did kubeadm init run?)
  fail:
    msg: "/etc/kubernetes/admin.conf not found. Run k8s_controlplane_init.yml first."
  when: not admin_conf.stat.exists

- name: Set kubeconfig fact
  set_fact:
    k8s_kubeconfig: "/etc/kubernetes/admin.conf"