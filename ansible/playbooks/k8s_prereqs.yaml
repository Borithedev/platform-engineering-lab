- hosts: k8s
  become: true
  vars:
    k8s_version: "v1.33"
    k8s_url_apt_key: "https://pkgs.k8s.io/core:/stable:/{{ k8s_version }}/deb/Release.key"
    k8s_gpgpath: /usr/share/keyrings/kubernetes-apt-keyring.gpg
    k8s_repository: "https://pkgs.k8s.io/core:/stable:/{{ k8s_version }}/deb/"
    k8s_package_version: "1.33.9-1.1"
    k8s_packages:
      - "kubelet={{ k8s_package_version }}"
      - "kubeadm={{ k8s_package_version }}"
      - "kubectl={{ k8s_package_version }}"

  tasks:

  - name: Disable swap
    command: swapoff -a
    changed_when: false

  - name: Remove swap from fstab
    replace:
      path: /etc/fstab
      regexp: '^.*swap.*$'
      replace: ''

  - name: Load kernel modules
    copy:
      dest: /etc/modules-load.d/k8s.conf
      content: |
        overlay
        br_netfilter
  
  - name: Load overlay now
    command: modprobe overlay
    changed_when: false
  
  - name: Load br_netfilter now
    command: modprobe br_netfilter
    changed_when: false

  - name: Apply sysctl settings
    copy:
      dest: /etc/sysctl.d/k8s.conf
      content: |
        net.bridge.bridge-nf-call-iptables = 1
        net.ipv4.ip_forward = 1
        net.bridge.bridge-nf-call-ip6tables = 1

  - name: Appy sysctl settings
    command: sysctl --system
    changed_when: false


  - name: Install containerd
    apt:
      name: containerd
      state: present
      update_cache: yes
  
  - name: Ensure /etc/containerd exists
    file:
      path: /etc/containerd
      state: directory
      owner: root
      group: root
      mode: "0755"

  - name: Generate default config
    command: containerd config default
    register: containerd_config
    changed_when: false

  - copy:
      dest: /etc/containerd/config.toml
      content: "{{ containerd_config.stdout }}"
      owner: root
      group: root
      mode: "0644"

  - name: Enable SystemdCgroup
    replace:
      path: /etc/containerd/config.toml
      regexp: 'SystemdCgroup = false'
      replace: 'SystemdCgroup = true'

  - systemd:
      name: containerd
      enabled: true
      state: restarted

  - name: Get Kubernetes package key
    shell: curl -fsSL {{ k8s_url_apt_key }} | gpg --dearmor -o {{ k8s_gpgpath }}
    args:
      creates: "{{ k8s_gpgpath }}"      

  - name: Install Kubernetes repository
    apt_repository:  
      filename: kubernetes  
      repo: "deb [signed-by={{ k8s_gpgpath }}] {{ k8s_repository }} /"    

  - name: Install Kubernetes Packages
    package: name={{ item }} state=present force=yes install_recommends=no
    loop: "{{ k8s_packages }}"

  - name: Hold versions
    command: apt-mark hold kubelet kubeadm kubectl
    changed_when: false

  - name: Enable kubelet
    systemd:
      name: kubelet
      enabled: true