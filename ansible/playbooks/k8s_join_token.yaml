- hosts: k8s_controlplane
  become: true
  tasks:
    - name: Create join command
      command: kubeadm token create --print-join-command
      register: join_cmd

    - name: Write join command to file
      copy:
        dest: /tmp/kubeadm_join.sh
        content: |
          #!/bin/bash
          set -e
          {{ join_cmd.stdout }}
        mode: "0700"

    - name: Expose join command
      set_fact:
        kubeadm_join_command: "{{ join_cmd.stdout }}"